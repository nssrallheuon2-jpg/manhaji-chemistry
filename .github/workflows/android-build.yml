name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # يسمح بالتشغيل اليدوي من قائمة Actions

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      # 1. تحميل الكود من المستودع
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      # 2. إعداد Java (مطلوب لـ Flutter Android)
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      # 3. إعداد Flutter SDK
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'  # غير هذا إلى إصدارك
          channel: 'stable'
          cache: true
      
      # 4. تثبيت التبعيات
      - name: 📦 Install dependencies
        run: flutter pub get
      
      # 5. تنظيف المشروع (اختياري)
      - name: 🧹 Clean project
        run: flutter clean
      
      # 6. بناء APK (للأندرويد فقط)
      - name: 🔨 Build APK
        run: flutter build apk --release --split-per-abi
      
      # 7. رفع ملف APK كـ Artifact (يمكن تنزيله بعد البناء)
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30
      
      # 8. (اختياري) رفع التقرير
      - name: 📊 Upload build report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: build/
          retention-days: 7
